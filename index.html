<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Double Space Killer - Fridge Combo</title>
    
    <link rel="icon" href="image_97.png">
    <link rel="apple-touch-icon" href="image_97.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --border: #ccc;
            --input-bg: #fafafa;
            --radius: 15px;
            --text-gray: #666;
            --placeholder: #bbb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* スクロールはTextarea内に限定 */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 15px 15px 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        header { margin-bottom: 10px; }
        h1 { font-size: 1.8rem; font-weight: 800; margin: 0; letter-spacing: -1.2px; }
        .subtitle { font-size: 0.85rem; color: var(--text-gray); font-weight: 600; margin: 2px 0 0; }

        .input-wrapper { 
            position: relative; 
            flex-grow: 1; /* ビューワーを最大化 */
            margin-bottom: 12px;
        }
        
        textarea {
            width: 100%;
            height: 100%;
            padding: 15px;
            padding-right: 40px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--input-bg);
            font-size: 1.1rem;
            line-height: 1.5;
            font-weight: 600;
            color: var(--main) !important;
            box-sizing: border-box;
            outline: none;
            resize: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        textarea::placeholder { color: var(--placeholder); -webkit-text-fill-color: var(--placeholder); }

        .clear-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.4rem;
            font-weight: 800;
            cursor: pointer;
            padding: 5px;
            display: none;
            z-index: 2;
        }
        .clear-btn.active { display: block; }

        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .action-btn {
            background: var(--accent);
            color: var(--main);
            border: none;
            padding: 14px 5px;
            border-radius: var(--radius);
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.05s, background-color 0.2s;
            touch-action: manipulation;
        }
        .action-btn:active { transform: scale(0.96); opacity: 0.9; }
        .action-btn.primary { 
            background: var(--main); 
            color: #fff; 
            grid-column: span 2; 
            font-size: 1rem;
            padding: 18px;
        }
        .action-btn.killed { background-color: #555 !important; }

        #toast {
            position: fixed; 
            top: -60px;
            left: 0;
            right: 0;
            height: 45px;
            background: var(--main);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            z-index: 3000;
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        #toast.visible { transform: translateY(60px); }

        footer { font-size: 10px; color: #999; line-height: 1.4; margin-top: 5px; }
        footer a { color: inherit; text-decoration: underline; }
        
        .footer-btns { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .kofi-btn {
            background: var(--main); color: #fff;
            padding: 10px; border-radius: 12px;
            text-decoration: none; font-weight: bold; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .home-btn {
            background: var(--accent); color: var(--main);
            border: none; padding: 10px; border-radius: 12px;
            font-weight: 800; font-size: 12px; cursor: pointer;
        }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 4000;
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 340px; padding: 30px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 12px; right: 15px; font-size: 20px; color: #888; cursor: pointer; }
    </style>
</head>
<body>

<div id="toast">Killed!</div>

<div class="container">
    <header>
        <h1>Double Space Killer</h1>
        <p class="subtitle">Ultimate spacing hygiene for professionals.</p>
    </header>

    <div class="input-wrapper">
        <textarea id="textInput" placeholder="Paste your text...&#10;It kills multi-spaces, trailing blanks, and fixes missing spaces after periods." oninput="handleInput()"></textarea>
        <button class="clear-btn" id="clrBtn" onclick="clearText()">×</button>
    </div>

    <div class="controls">
        <button class="action-btn primary" id="killBtn" onclick="killSpaces()">Kill Multi-Spaces</button>
        <button class="action-btn" onclick="tabToSpace()">Tab to Space</button>
        <button class="action-btn" id="copyBtn" onclick="copyResult()">Copy Clean</button>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add Home</button>
    </div>

    <footer>
        <div>No login / No tracking / No ads / Browser only</div>
        <div><a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026</div>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3>📱 Install</h3>
        <p style="font-size: 14px;">Add to your home screen.</p>
        <p style="font-size: 13px;">🍏 <strong>iPhone:</strong> Share > Add to Home Screen.</p>
        <p style="font-size: 13px;">🤖 <strong>Android:</strong> Menu > Add to Home Screen.</p>
    </div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const clrBtn = document.getElementById('clrBtn');
    const toast = document.getElementById('toast');
    const killBtn = document.getElementById('killBtn');
    const copyBtn = document.getElementById('copyBtn');
    let toastTimer;

    window.onload = () => {
        const saved = localStorage.getItem('killer_data_v2');
        if (saved) {
            textInput.value = saved;
            updateClearBtn();
        }
    };

    function handleInput() {
        updateClearBtn();
        saveData();
    }

    function saveData() {
        localStorage.setItem('killer_data_v2', textInput.value);
    }

    function updateClearBtn() {
        clrBtn.classList.toggle('active', textInput.value !== '');
    }

    function clearText() {
        textInput.value = '';
        updateClearBtn();
        saveData();
        textInput.focus();
    }

    function killSpaces() {
        let text = textInput.value;
        if (!text.trim()) return;

        // 1. 全角スペースを半角化
        text = text.replace(/　/g, ' ');
        // 2. 二重以上の半角スペースを単一化
        text = text.replace(/ +/g, ' ');
        // 3. 句読点（.?!）の直後に英数字がある場合、スペースを強制挿入
        text = text.replace(/([.?!])([A-Za-z0-9])/g, '$1 $2');
        // 4. 各行のトリム（行頭・行末のゴミ掃除）
        text = text.split('\n').map(line => line.trim()).join('\n');
        // 5. 三重以上の改行を整理
        text = text.replace(/\n{3,}/g, '\n\n');

        textInput.value = text;
        saveData();
        
        const originalText = killBtn.innerText;
        killBtn.innerText = 'All Killed!';
        killBtn.classList.add('killed');
        showToast('Hygiene complete!');
        
        setTimeout(() => {
            killBtn.innerText = originalText;
            killBtn.classList.remove('killed');
        }, 1500);
    }

    function tabToSpace() {
        let text = textInput.value;
        if (!text.includes('\t')) {
            showToast('No tabs found');
            return;
        }
        textInput.value = text.replace(/\t/g, ' ');
        saveData();
        showToast('Tabs converted to spaces');
    }

    async function copyResult() {
        if (!textInput.value.trim()) return;
        try {
            await navigator.clipboard.writeText(textInput.value);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = 'Copied!';
            showToast('Copied to Clipboard!');
            setTimeout(() => {
                copyBtn.innerText = originalText;
            }, 1500);
        } catch (err) {}
    }

    function showToast(msg) {
        clearTimeout(toastTimer);
        toast.innerText = msg;
        toast.classList.add('visible');
        toastTimer = setTimeout(() => {
            toast.classList.remove('visible');
        }, 1200);
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
